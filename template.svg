<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" height="100%" viewBox="0 0 758 1024" xmlns="http://www.w3.org/2000/svg">
	<!-- Background -->
	<rect width="758" height="1024" fill="#ffffff" />

	<!-- TIME BLOCK (Top Center) -->
	<text x="379" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="160" font-weight="bold" text-anchor="middle" fill="#000000">{{TIME}}</text>
	
	<!-- DATE BLOCK -->
	<text x="379" y="380" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="300" letter-spacing="6" text-anchor="middle" fill="#444444">{{DATE}}</text>

	<!-- ELEGANT SEPARATOR LINE -->
	<line x1="120" y1="465" x2="638" y2="465" stroke="#cccccc" stroke-width="2" stroke-dasharray="8 6" />

	<!-- WEATHER DETAILS (Bottom Asymmetric Grid) -->
	
	<!-- Weather Icon Column (Left) -->
	<g transform="translate(240, 670)">
		{{WEATHER_ICON}}
	</g>

	<!-- Weather Typography Column (Right) -->
	<!-- Temperature Display -->
	<text x="400" y="650" font-family="Georgia, 'Times New Roman', serif" font-size="130" font-weight="bold" fill="#000000">{{TEMP}}<tspan font-size="60" dy="-50">°</tspan></text>
	
	<!-- Condition Subtitle -->
	<text x="405" y="705" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" letter-spacing="1" fill="#111111">{{DESC}}</text>
	
	<!-- Statistics Line -->
	<text x="405" y="755" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" fill="#555555">Humidity: {{HUMIDITY}}%  •  Wind: {{WIND}} m/s</text>

	<!-- FOOTER BLOCK (Bottom Center) -->
	<line x1="120" y1="875" x2="638" y2="875" stroke="#e5e5e5" stroke-width="1" />
	
	<text x="379" y="930" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" letter-spacing="1.5" text-anchor="middle" fill="#777777">Updated: {{UPDATE_TIME}}  |  Battery: {{BATTERY}}%  |  [Tap to Exit]</text>
	<text x="379" y="960" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" letter-spacing="3" text-anchor="middle" fill="#999999">KINDLE WEATHER DASHBOARD</text>
</svg>
